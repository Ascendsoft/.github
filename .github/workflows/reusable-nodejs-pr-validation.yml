name: Reusable Node.js PR Validation

on:
  workflow_call:
    inputs:
      service_name:
        required: true
        type: string
      working_directory:
        required: false
        type: string
        default: '.'
      node_version:
        required: false
        type: string
        default: '20'
      test_framework:
        required: false
        type: string
        default: 'mocha'
        description: 'Test framework: mocha or jest'
      has_lint:
        required: false
        type: boolean
        default: false
      has_tests:
        required: false
        type: boolean
        default: true

jobs:
  validate:
    name: PR Validation — ${{ inputs.service_name }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.working_directory }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node_version }}
          cache: 'npm'
          cache-dependency-path: '${{ inputs.working_directory }}/package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        if: inputs.has_lint
        run: npm run lint

      - name: Run tests (P0 + P1)
        if: inputs.has_tests
        run: npm test
        env:
          NODE_ENV: test

      - name: Build check
        run: |
          if npm run build --if-present 2>/dev/null; then
            echo "Build succeeded"
          else
            echo "No build script or build succeeded"
          fi

      - name: Validation summary
        if: always()
        run: |
          echo "## PR Validation Summary — ${{ inputs.service_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- Node.js: ${{ inputs.node_version }}" >> $GITHUB_STEP_SUMMARY
          echo "- Test framework: ${{ inputs.test_framework }}" >> $GITHUB_STEP_SUMMARY
          echo "- Working directory: ${{ inputs.working_directory }}" >> $GITHUB_STEP_SUMMARY
