name: Reusable Frontend PR Validation

on:
  workflow_call:
    inputs:
      app_name:
        required: true
        type: string
      node_version:
        required: false
        type: string
        default: '20'
      has_lint:
        required: false
        type: boolean
        default: false
      has_tests:
        required: false
        type: boolean
        default: false
      has_typecheck:
        required: false
        type: boolean
        default: false

jobs:
  validate:
    name: PR Validation — ${{ inputs.app_name }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node_version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        if: inputs.has_typecheck
        run: npx tsc --noEmit

      - name: Lint
        if: inputs.has_lint
        run: npm run lint

      - name: Run tests
        if: inputs.has_tests
        run: npm test
        env:
          CI: true

      - name: Build
        run: npm run build

      - name: Validation summary
        if: always()
        run: |
          echo "## PR Validation Summary — ${{ inputs.app_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- Node.js: ${{ inputs.node_version }}" >> $GITHUB_STEP_SUMMARY
