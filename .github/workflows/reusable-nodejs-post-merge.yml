name: Reusable Node.js Post-Merge Full Test Suite

on:
  workflow_call:
    inputs:
      service_name:
        required: true
        type: string
      working_directory:
        required: false
        type: string
        default: '.'
      node_version:
        required: false
        type: string
        default: '20'
      has_lint:
        required: false
        type: boolean
        default: false
      has_tests:
        required: false
        type: boolean
        default: true
      has_coverage:
        required: false
        type: boolean
        default: false

jobs:
  full-suite:
    name: Post-Merge Full Suite — ${{ inputs.service_name }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.working_directory }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node_version }}
          cache: 'npm'
          cache-dependency-path: '${{ inputs.working_directory }}/package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        if: inputs.has_lint
        run: npm run lint

      - name: Run full test suite
        if: inputs.has_tests
        run: |
          if npm run test:all --if-present 2>/dev/null; then
            echo "Full test suite passed"
          else
            npm test
          fi
        env:
          NODE_ENV: test

      - name: Coverage report
        if: inputs.has_coverage
        run: npm run test:coverage
        env:
          NODE_ENV: test

      - name: Build verification
        run: |
          if npm run build --if-present 2>/dev/null; then
            echo "Build succeeded"
          else
            echo "No build script or build succeeded"
          fi

      - name: Post-merge summary
        if: always()
        run: |
          echo "## Post-Merge Summary — ${{ inputs.service_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- Node.js: ${{ inputs.node_version }}" >> $GITHUB_STEP_SUMMARY
          echo "- Commit: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
