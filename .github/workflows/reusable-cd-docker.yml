# Reusable CD — Docker Blue-Green Deploy + Auto-Rollback
#
# Caller pattern (cd-deploy-test.yml in a Docker-based service repo):
#
#   jobs:
#     deploy:
#       if: ${{ github.event.inputs.confirm == 'deploy' }}
#       uses: Ascendsoft/.github/.github/workflows/reusable-cd-docker.yml@main
#       with:
#         service_name: web-app
#         repo_dir: /var/www/web-app
#         build_dir: VDC
#         port: 5174
#         server_name: test.emedihub.com
#         public_url: https://test.emedihub.com
#         skip_merge: ${{ github.event.inputs.skip_merge == 'true' }}
#       secrets: inherit
#
# Rollback strategy (Docker image-based):
#   - Before every swap the running image tag is written to
#     /var/www/<service>/.last-stable-image on the DO server.
#   - Health-check failure → inline do_rollback() → deploy job fails.
#   - Smoke-test failure  → separate `rollback` job SSHes in,
#     reads .last-stable-image, restores container → workflow fails.
#
# Smoke tests: tag your Playwright tests with @smoke.
# The reusable workflow runs all --grep "@smoke" tests against public_url.

name: Reusable — CD Docker Blue-Green Deploy + Rollback

on:
  workflow_call:
    inputs:
      service_name:
        description: 'Docker image name prefix (e.g. web-app)'
        type: string
        required: true
      repo_dir:
        description: 'Absolute path to repo root on the DO server'
        type: string
        required: true
      build_dir:
        description: 'Subdirectory containing Dockerfile and package.json (relative to repo_dir)'
        type: string
        default: '.'
      port:
        description: 'Host port the container is mapped to'
        type: number
        required: true
      server_name:
        description: 'Nginx server name / FQDN passed as Docker build arg'
        type: string
        required: true
      public_url:
        description: 'Public HTTPS URL used for smoke tests (e.g. https://test.emedihub.com)'
        type: string
        required: true
      skip_merge:
        description: 'Skip merging development → release'
        type: boolean
        default: false
      node_max_old_space_mb:
        description: 'NODE_OPTIONS --max-old-space-size (MB) for the build step'
        type: number
        default: 1536

concurrency:
  group: deploy-${{ inputs.service_name }}
  cancel-in-progress: false

jobs:
  # ───────────────────────────────────────────────────────────────────────────
  # JOB 1 — Deploy (Docker blue-green + inline health-check rollback)
  # ───────────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy ${{ inputs.service_name }} (Docker blue-green)
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Deploy via SSH
        id: deploy
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DO_HOST }}
          username: root
          key: ${{ secrets.DO_SSH_KEY }}
          command_timeout: 20m
          script: |
            SERVICE="${{ inputs.service_name }}"
            REPO_DIR="${{ inputs.repo_dir }}"
            BUILD_DIR="$REPO_DIR/${{ inputs.build_dir }}"
            PORT=${{ inputs.port }}
            ROLLBACK_TRIGGERED=false

            # ── Rollback function ────────────────────────────────────────────
            do_rollback() {
              local REASON="$1"
              local FAILED_IMAGE="$2"
              ROLLBACK_TRIGGERED=true

              STABLE_IMAGE=$(cat "$REPO_DIR/.last-stable-image" 2>/dev/null || echo "none")

              echo "════════════════════════════════════════════════"
              echo "  🔴 ROLLBACK TRIGGERED"
              echo "  Reason:       $REASON"
              echo "  Failed image: $FAILED_IMAGE"
              echo "  Stable image: $STABLE_IMAGE"
              echo "════════════════════════════════════════════════"

              BAD=$(docker ps --format '{{.ID}} {{.Ports}}' | grep "0\.0\.0\.0:$PORT->" | awk '{print $1}' || true)
              if [ -n "$BAD" ]; then
                docker stop "$BAD" || true
                docker rm   "$BAD" || true
              fi

              if [ "$STABLE_IMAGE" = "none" ] || [ -z "$STABLE_IMAGE" ]; then
                echo "⚠️  No stable image pointer — cannot auto-rollback."
                echo "    Manual intervention required on port $PORT."
                exit 1
              fi

              RESTORE_NAME="$SERVICE-rollback-$(date +%Y%m%d-%H%M)"
              echo "🟢 Restoring $STABLE_IMAGE as $RESTORE_NAME on port $PORT..."
              docker run -d \
                --name "$RESTORE_NAME" \
                -p $PORT:80 \
                --restart unless-stopped \
                "$STABLE_IMAGE"

              echo "🏥 Health check on restored container..."
              RESTORED=false
              for i in $(seq 1 10); do
                HTTP=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:$PORT/ 2>/dev/null || echo "000")
                if [ "$HTTP" = "200" ]; then
                  echo "✅ Restored container is healthy (HTTP 200)"
                  RESTORED=true
                  break
                fi
                echo "  Attempt $i/10 — HTTP $HTTP, waiting 5s..."
                sleep 5
              done

              echo "════════════════════════════════════════════════"
              [ "$RESTORED" = "true" ] && echo "  ✅ Rollback complete" || echo "  ❌ Restored container also unhealthy"
              echo "  Image: $STABLE_IMAGE | Port: $PORT"
              echo "════════════════════════════════════════════════"
              exit 1
            }

            echo "══════════════════════════════════════════════"
            echo "  Deploying $SERVICE to TEST (DigitalOcean)"
            echo "  Strategy: Docker blue-green | Port: $PORT"
            echo "══════════════════════════════════════════════"

            cd "$REPO_DIR"
            git fetch origin
            git checkout release
            git stash --quiet 2>/dev/null || true

            if [ "${{ inputs.skip_merge }}" != "true" ]; then
              echo "📥 Merging development → release..."
              git merge origin/development --no-edit
              git push origin release
            else
              echo "⏭️  Skipping merge, redeploying current release..."
            fi

            git pull origin release
            COMMIT=$(git rev-parse --short HEAD)

            # ── Capture previous image BEFORE swap ───────────────────────────
            PREV_CONTAINER=$(docker ps --format '{{.ID}} {{.Ports}}' | grep "0\.0\.0\.0:$PORT->" | awk '{print $1}' || true)
            if [ -n "$PREV_CONTAINER" ]; then
              PREVIOUS_IMAGE=$(docker inspect --format '{{.Config.Image}}' "$PREV_CONTAINER" 2>/dev/null || echo "none")
            else
              PREVIOUS_IMAGE="none"
            fi
            echo "📸 Previous image: $PREVIOUS_IMAGE"
            echo "$PREVIOUS_IMAGE" > "$REPO_DIR/.last-stable-image"

            cd "$BUILD_DIR"
            echo "📦 Installing dependencies..."
            npm ci

            echo "🔨 Building for test environment..."
            cp .env.test .env
            export NODE_OPTIONS="--max-old-space-size=${{ inputs.node_max_old_space_mb }}"
            npm run build:test

            DEPLOY_DATETIME=$(date +%Y%m%d-%H%M)
            IMAGE_TAG="$SERVICE:release-$DEPLOY_DATETIME"
            echo "🐳 Building Docker image: $IMAGE_TAG"
            docker build --no-cache \
              --build-arg BUILD_ENV=test \
              --build-arg SERVER_NAME=${{ inputs.server_name }} \
              -t "$IMAGE_TAG" \
              -f "$BUILD_DIR/Dockerfile" \
              "$BUILD_DIR"

            # ── Blue-green swap ───────────────────────────────────────────────
            OLD_CONTAINER=$(docker ps --format '{{.ID}} {{.Ports}}' | grep "0\.0\.0\.0:$PORT->" | awk '{print $1}' || true)
            if [ -n "$OLD_CONTAINER" ]; then
              OLD_NAME=$(docker inspect --format '{{.Name}}' "$OLD_CONTAINER" | sed 's|/||')
              echo "🔵 Stopping old container: $OLD_NAME"
              docker stop "$OLD_CONTAINER"
              docker rm   "$OLD_CONTAINER"
            fi

            CONTAINER_NAME="$SERVICE-release-$DEPLOY_DATETIME"
            echo "🟢 Starting new container: $CONTAINER_NAME on port $PORT"
            docker run -d \
              --name "$CONTAINER_NAME" \
              -p $PORT:80 \
              --restart unless-stopped \
              -e NODE_ENV=test \
              "$IMAGE_TAG"

            echo "🏥 Health check on port $PORT..."
            RETRIES=10
            HTTP_CODE="000"
            for i in $(seq 1 $RETRIES); do
              HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:$PORT/ 2>/dev/null || echo "000")
              if [ "$HTTP_CODE" = "200" ]; then
                echo "✅ $SERVICE is healthy (HTTP 200)"
                break
              fi
              echo "  Attempt $i/$RETRIES — HTTP $HTTP_CODE, waiting 5s..."
              sleep 5
            done

            if [ "$HTTP_CODE" != "200" ]; then
              echo "❌ Health check failed"
              docker logs "$CONTAINER_NAME" --tail 50
              do_rollback "health-check-failure" "$IMAGE_TAG"
            fi

            pm2 delete "$SERVICE" 2>/dev/null || true

            # Prune old images — only on success path
            echo "🧹 Pruning old $SERVICE images (keeping last 3)..."
            docker images "$SERVICE" --format '{{.ID}} {{.CreatedAt}}' | \
              sort -k2 -r | tail -n +4 | awk '{print $1}' | \
              xargs -r docker rmi --force 2>/dev/null || true

            echo "══════════════════════════════════════════════"
            echo "  ✅ $SERVICE deployed successfully"
            echo "  Commit: $COMMIT | Image: $IMAGE_TAG"
            echo "  Port:   $PORT   | URL: ${{ inputs.public_url }}"
            echo "══════════════════════════════════════════════"

      - name: Write health-check rollback summary
        if: failure()
        run: |
          echo "## ❌ Deployment Rolled Back — ${{ inputs.service_name }} — Health Check Failure" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Field | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Reason | New container did not return HTTP 200 within 50s |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Timestamp | $(date -u '+%Y-%m-%d %H:%M UTC') |" >> "$GITHUB_STEP_SUMMARY"
          echo "| URL | ${{ inputs.public_url }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Previous stable image restored (if one existed). See SSH step output for details." >> "$GITHUB_STEP_SUMMARY"

  # ───────────────────────────────────────────────────────────────────────────
  # JOB 2 — Smoke Tests (blocking)
  # ───────────────────────────────────────────────────────────────────────────
  smoke-tests:
    name: Smoke Tests
    needs: deploy
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: success()

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: ${{ inputs.build_dir }}/package-lock.json

      - name: Install dependencies
        working-directory: ${{ inputs.build_dir }}
        run: npm ci

      - name: Install Playwright (Chromium only)
        working-directory: ${{ inputs.build_dir }}
        run: npx playwright install --with-deps chromium

      - name: Wait for deployment to stabilise
        run: sleep 15

      - name: Run @smoke E2E tests
        working-directory: ${{ inputs.build_dir }}
        env:
          PLAYWRIGHT_BASE_URL: ${{ inputs.public_url }}
          CI: true
        run: |
          npx playwright test \
            --grep "@smoke" \
            --reporter=list,json

      - name: Upload smoke results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: smoke-results-${{ inputs.service_name }}-${{ github.run_id }}
          path: |
            ${{ inputs.build_dir }}/test-results/
            ${{ inputs.build_dir }}/playwright-report/
          retention-days: 14

  # ───────────────────────────────────────────────────────────────────────────
  # JOB 3 — Rollback (triggered only when smoke-tests fails)
  # ───────────────────────────────────────────────────────────────────────────
  rollback:
    name: Rollback (${{ inputs.service_name }} smoke failure)
    needs: [deploy, smoke-tests]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: needs.smoke-tests.result == 'failure'

    steps:
      - name: Rollback via SSH
        id: rollback_ssh
        continue-on-error: true
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DO_HOST }}
          username: root
          key: ${{ secrets.DO_SSH_KEY }}
          command_timeout: 5m
          script: |
            PORT=${{ inputs.port }}
            REPO_DIR="${{ inputs.repo_dir }}"
            SERVICE="${{ inputs.service_name }}"

            echo "════════════════════════════════════════════════"
            echo "  🔴 ROLLBACK — smoke-test failure"
            echo "  Service: $SERVICE"
            echo "════════════════════════════════════════════════"

            STABLE_IMAGE=$(cat "$REPO_DIR/.last-stable-image" 2>/dev/null || echo "none")
            echo "  Stable image: $STABLE_IMAGE"

            BAD=$(docker ps --format '{{.ID}} {{.Ports}}' | grep "0\.0\.0\.0:$PORT->" | awk '{print $1}' || true)
            if [ -n "$BAD" ]; then
              FAILED_IMAGE=$(docker inspect --format '{{.Config.Image}}' "$BAD" 2>/dev/null || echo "unknown")
              echo "  Failed image: $FAILED_IMAGE"
              docker stop "$BAD" || true
              docker rm   "$BAD" || true
            fi

            if [ "$STABLE_IMAGE" = "none" ] || [ -z "$STABLE_IMAGE" ]; then
              echo "⚠️  No stable image pointer — manual intervention required"
              exit 1
            fi

            RESTORE_NAME="$SERVICE-rollback-$(date +%Y%m%d-%H%M)"
            echo "🟢 Restoring $STABLE_IMAGE as $RESTORE_NAME..."
            docker run -d \
              --name "$RESTORE_NAME" \
              -p $PORT:80 \
              --restart unless-stopped \
              "$STABLE_IMAGE"

            echo "🏥 Health check on restored container..."
            for i in $(seq 1 10); do
              HTTP=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:$PORT/ 2>/dev/null || echo "000")
              if [ "$HTTP" = "200" ]; then
                echo "✅ Restored container healthy"
                break
              fi
              echo "  Attempt $i/10 — HTTP $HTTP, waiting 5s..."
              sleep 5
            done

            echo "════════════════════════════════════════════════"
            echo "  Rollback complete — $STABLE_IMAGE is live"
            echo "  URL: ${{ inputs.public_url }}"
            echo "════════════════════════════════════════════════"

      - name: Write rollback step summary
        if: always()
        run: |
          echo "## ❌ Deployment Rolled Back — ${{ inputs.service_name }} — Smoke Test Failure" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Field | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Reason | Post-deploy @smoke tests failed |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Timestamp | $(date -u '+%Y-%m-%d %H:%M UTC') |" >> "$GITHUB_STEP_SUMMARY"
          echo "| URL | ${{ inputs.public_url }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Results | [smoke-results-${{ inputs.service_name }}-${{ github.run_id }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "> Bad image is **not pruned** — available on server for post-mortem debugging." >> "$GITHUB_STEP_SUMMARY"

      - name: Mark deployment as failed
        run: exit 1
